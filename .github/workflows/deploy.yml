name: Export and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.3

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup export templates
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates/4.6.3.stable"
          cp -r /root/.local/share/godot/export_templates/4.6.3.stable/. \
             "$HOME/.local/share/godot/export_templates/4.6.3.stable/"

      - name: Create output folder
        run: mkdir -p builds/web

      - name: Export Web build
        run: |
          godot --headless --export-release "Web" builds/web/index.html

      - name: Add .nojekyll (required for GitHub Pages)
        run: touch builds/web/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: builds/web
          force_orphan: true
